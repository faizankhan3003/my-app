name: Build, Scan, Deploy, Notify

on:
  push:
    branches:
      - main
  workflow_dispatch:               # Allow manual trigger from GitHub UI

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-app
  IMAGE_TAG: ${{ github.sha }}     # Full commit SHA as image tag

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build, Scan, Push
  # ─────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build → Scan → Push
    runs-on: self-hosted            # Your machine, not GitHub's cloud runner

    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}
      short-sha: ${{ steps.set-tag.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag outputs
        id: set-tag
        run: |
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "short-sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Build locally — don't push yet
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      # Scan BEFORE pushing — fail fast on CRITICAL/HIGH
      - name: Trivy security scan
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # Only reaches here if scan passed
      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

          docker logout

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Minikube
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: build-scan-push          # Only runs if Job 1 succeeded
    environment: production         # Manual approval gate (optional — configure in repo settings)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Minikube is running
        run: |
          minikube status
          kubectl get nodes

      - name: Apply Kubernetes manifests
        run: |
          # Replace placeholder with real image URI
          sed -i "s|YOUR_DOCKERHUB_USERNAME/my-app:latest|${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" \
            k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update image (if deployment already exists)
        run: |
          kubectl set image deployment/my-app \
            my-app=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --namespace=default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/my-app \
            --namespace=default \
            --timeout=120s

      - name: Show running pods
        run: |
          echo "--- Pods ---"
          kubectl get pods -n default -l app=my-app -o wide

          echo "--- Service ---"
          kubectl get svc my-app-svc -n default

          echo "--- App URL ---"
          minikube service my-app-svc --url

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Slack Notification (always runs)
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: self-hosted
    needs: [build-scan-push, deploy]
    if: always()                    # Run even if previous jobs failed

    steps:
      - name: Notify success
        if: ${{ needs.deploy.result == 'success' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            ✅ *DEPLOYMENT SUCCEEDED*
            *Repo:* ${{ github.repository }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* `${{ github.sha }}`
            *Triggered by:* ${{ github.actor }}
            *Image:* `${{ env.IMAGE_NAME }}:${{ github.sha }}`
            *Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify failure
        if: ${{ needs.build-scan-push.result == 'failure' || needs.deploy.result == 'failure' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            ❌ *DEPLOYMENT FAILED*
            *Repo:* ${{ github.repository }}
            *Branch:* ${{ github.ref_name }}
            *Commit:* `${{ github.sha }}`
            *Triggered by:* ${{ github.actor }}
            *Failed job:* ${{ needs.build-scan-push.result == 'failure' && 'Build/Scan/Push' || 'Deploy' }}
            *Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}