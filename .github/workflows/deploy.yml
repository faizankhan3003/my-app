name: Build, Scan, Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/my-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build, Scan, Push
  # ─────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build → Scan → Push
    runs-on: self-hosted

    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag output
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build `
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} `
            -t ${{ env.IMAGE_NAME }}:latest `
            .

      - name: Trivy security scan
        run: |
          trivy image `
            --severity CRITICAL,HIGH `
            --exit-code 1 `
            --ignore-unfixed `
            --format table `
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | `
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest
          docker logout

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Minikube
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: build-scan-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Minikube is running
        run: |
          minikube status
          kubectl get nodes

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Update image
        run: |
          kubectl set image deployment/my-app `
            my-app=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} `
            --namespace=default

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/my-app `
            --namespace=default `
            --timeout=120s

      - name: Show running pods
        run: |
          kubectl get pods -n default -l app=my-app -o wide
          kubectl get svc my-app-svc -n default
